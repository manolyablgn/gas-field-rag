<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saha Destek Asistanı</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 16px; background: #0f172a; color: #e2e8f0; }
  h1 { font-size: 20px; }
  #chat { border: 1px solid #334155; border-radius: 8px; padding: 16px; min-height: 300px; margin-bottom: 16px; background: #1e293b; }
  .msg { margin-bottom: 12px; line-height: 1.5; }
  .user { color: #38bdf8; font-weight: bold; }
  .bot { color: #e2e8f0; }
  .sources { font-size: 12px; color: #94a3b8; margin-top: 8px; padding-top: 8px; border-top: 1px solid #334155; }
  .sources::before { content: "📎 "; }
  form { display: flex; gap: 8px; }
  input { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; }
  button { padding: 10px 16px; border-radius: 6px; border: none; background: #38bdf8; color: #0f172a; font-weight: bold; cursor: pointer; }
  button:disabled { opacity: 0.5; }
</style>
</head>
<body>
  <h1>🛠️ Saha Destek Asistanı (Offline)</h1>

  <div id="uploadBox" style="margin-bottom: 16px; padding: 12px; border: 1px dashed #334155; border-radius: 8px;">
    <input type="file" id="fileInput" accept=".md,.pdf" style="color: #e2e8f0;" />
    <button id="uploadBtn" style="padding: 6px 12px; border-radius: 6px; border: none; background: #38bdf8; color: #0f172a; font-weight: bold; cursor: pointer;">Yükle ve İndeksle</button>
    <div id="uploadStatus" style="margin-top: 8px; font-size: 13px; color: #94a3b8;"></div>
  </div>

  <div id="chat"></div>
  <form id="form">
    <input id="input" placeholder="Bir soru sor..." autocomplete="off" />
    <button type="submit">Gönder</button>
  </form>

<script>
  const chat = document.getElementById("chat");
  const form = document.getElementById("form");
  const input = document.getElementById("input");
  const fileInput = document.getElementById("fileInput");
  const uploadBtn = document.getElementById("uploadBtn");
  const uploadStatus = document.getElementById("uploadStatus");

  uploadBtn.addEventListener("click", async () => {
    const file = fileInput.files[0];
    if (!file) {
      uploadStatus.innerText = "Önce bir dosya seç.";
      return;
    }

    uploadBtn.disabled = true;
    uploadStatus.innerText = "⏳ Yükleniyor ve yeniden indeksleniyor (biraz sürebilir)...";

    const formData = new FormData();
    formData.append("document", file);

    try {
      const res = await fetch("/api/upload", { method: "POST", body: formData });
      const data = await res.json();

      if (data.error) {
        uploadStatus.innerText = "❌ " + data.error;
      } else {
        uploadStatus.innerText = `✅ "${data.filename}" eklendi. Toplam ${data.documentCount} doküman, ${data.chunkCount} chunk.`;
        fileInput.value = "";
      }
    } catch (err) {
      uploadStatus.innerText = "❌ Yükleme başarısız, bağlantıyı kontrol et.";
    }

    uploadBtn.disabled = false;
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const question = input.value.trim();
    if (!question) return;

    addMessage("user", question);
    input.value = "";
    input.disabled = true;

    const loadingId = addMessage("bot", "");
    const el = document.getElementById(loadingId);
    let fullText = "";

    try {
      const res = await fetch("/api/chat/stream", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question }),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n\n");
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const data = JSON.parse(line.slice(6));

          if (data.token) {
            fullText += data.token;
            el.innerHTML = fullText.replace(/\n/g, "<br>");
            chat.scrollTop = chat.scrollHeight;
          } else if (data.done) {
            if (data.sources && data.sources.length > 0) {
              const src = document.createElement("div");
              src.className = "sources";
              src.innerText = "Kaynak: " + data.sources.map((s) => s.title).join(", ");
              el.appendChild(src);
            }
          } else if (data.error) {
            el.innerText = "❌ " + data.error;
          }
        }
      }
    } catch (err) {
      el.innerText = "❌ Bağlantı hatası.";
    }

    input.disabled = false;
    input.focus();
  });

  function addMessage(role, text) {
    const id = "msg-" + Date.now() + Math.random();
    const div = document.createElement("div");
    div.className = "msg " + role;
    div.id = id;
    div.innerText = (role === "user" ? "Sen: " : "Asistan: ") + text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return id;
  }
</script>
</body>
</html>
