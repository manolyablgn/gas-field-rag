<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saha Destek Asistanı</title>
<style>
  :root {
    --bg: #10141b;
    --panel: #171d26;
    --panel-raised: #1d2530;
    --border: #2a323d;
    --border-strong: #3a4552;
    --text: #e7eaee;
    --text-muted: #8a96a6;
    --text-dim: #5b6572;
    --accent: #f0a93b;
    --ok: #48b37d;
    --warn: #d9695f;
    --font-display: "Bahnschrift", "Arial Narrow", sans-serif;
    --font-body: "Segoe UI", system-ui, sans-serif;
    --font-mono: "Consolas", "SF Mono", monospace;
  }
  * { box-sizing: border-box; }
  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 24px 16px 40px;
    background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 28px 28px;
    background-attachment: fixed;
  }
  .shell { max-width: 720px; margin: 0 auto; }
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px;
    background: var(--panel-raised);
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    margin-bottom: 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,.25);
  }
  .led { width: 11px; height: 11px; border-radius: 50%; background: var(--text-dim); box-shadow: 0 0 0 3px rgba(240,169,59,0); transition: background .25s, box-shadow .25s; flex-shrink: 0; }
  .led.busy { background: var(--accent); box-shadow: 0 0 0 3px rgba(240,169,59,.18); animation: pulse 1.1s ease-in-out infinite; }
  .led.ok { background: var(--ok); box-shadow: 0 0 0 3px rgba(72,179,125,.18); }
  .led.warn { background: var(--warn); box-shadow: 0 0 0 3px rgba(217,105,95,.18); }
  @media (prefers-reduced-motion: reduce) { .led.busy, .dots span { animation: none !important; } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .45; } }
  header h1 { font-family: var(--font-display); font-size: 17px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; margin: 0; }
  header .tag { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  header .status-label { margin-left: auto; font-family: var(--font-mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); }
  .upload-tray { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--panel); border: 1px dashed var(--border-strong); border-radius: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .upload-tray .eyebrow { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); letter-spacing: .08em; text-transform: uppercase; width: 100%; }
  input[type="file"] { color: var(--text-muted); font-family: var(--font-mono); font-size: 12px; max-width: 220px; }
  #uploadStatus { font-family: var(--font-mono); font-size: 11.5px; color: var(--text-muted); width: 100%; }
  #chat { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; min-height: 320px; margin-bottom: 14px; display: flex; flex-direction: column; gap: 2px; box-shadow: inset 0 2px 12px rgba(0,0,0,.2); }
  .empty-state { text-align: center; padding: 36px 12px; color: var(--text-dim); }
  .empty-state .big { font-family: var(--font-display); font-size: 15px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 14px; }
  .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .suggestion-chip { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); border: 1px solid var(--border-strong); background: var(--panel-raised); padding: 7px 12px; border-radius: 20px; cursor: pointer; transition: border-color .15s, color .15s; }
  .suggestion-chip:hover { border-color: var(--accent); color: var(--text); }
  .entry { display: flex; gap: 10px; padding: 10px 12px; margin: 6px 0; animation: fadeIn .25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: none; } }
  .avatar { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 10.5px; font-weight: 700; flex-shrink: 0; margin-top: 2px; }
  .entry.user .avatar { background: var(--border-strong); color: var(--text-muted); }
  .entry.bot .avatar { background: var(--accent); color: #1a1305; }
  .entry.bot.grounded .avatar { background: var(--ok); color: #06210f; }
  .entry.bot.no-info .avatar { background: var(--warn); color: #2b0906; }
  .entry-body { flex: 1; border-left: 2px solid var(--border-strong); padding-left: 12px; }
  .entry.bot .entry-body { border-left-color: var(--accent); }
  .entry.bot.grounded .entry-body { border-left-color: var(--ok); }
  .entry.bot.no-info .entry-body { border-left-color: var(--warn); }
  .role { font-family: var(--font-mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; display: block; margin-bottom: 4px; color: var(--text-dim); }
  .body-text { font-size: 14.5px; line-height: 1.55; }
  .cursor { display: inline-block; width: 7px; height: 15px; background: var(--accent); margin-left: 2px; vertical-align: text-bottom; animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .dots { display: inline-flex; gap: 4px; padding: 2px 0; }
  .dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: bounce 1.2s ease-in-out infinite; }
  .dots span:nth-child(2) { animation-delay: .15s; }
  .dots span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: .5; } 30% { transform: translateY(-4px); opacity: 1; } }
  .sources { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .source-chip { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); border: 1px solid var(--border-strong); background: var(--panel-raised); padding: 3px 8px; border-radius: 3px; }
  .source-chip::before { content: "⟶ "; color: var(--text-dim); }
  form { display: flex; gap: 8px; }
  input#input { flex: 1; padding: 12px 14px; border-radius: 6px; border: 1px solid var(--border-strong); background: var(--panel-raised); color: var(--text); font-family: var(--font-body); font-size: 14px; transition: border-color .15s; }
  input#input:focus, input[type="file"]:focus, button:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  button { padding: 12px 20px; border-radius: 6px; border: 1px solid var(--accent); background: var(--accent); color: #1a1305; font-family: var(--font-display); font-weight: 600; letter-spacing: .03em; text-transform: uppercase; font-size: 12.5px; cursor: pointer; transition: filter .15s, transform .1s; }
  button:hover:not(:disabled) { filter: brightness(1.08); }
  button:active:not(:disabled) { transform: scale(.97); }
  button:disabled { opacity: .4; cursor: default; }
  #uploadBtn { padding: 6px 14px; font-size: 11px; }
  @media (max-width: 480px) { body { padding: 14px 10px 28px; } header h1 { font-size: 15px; } .status-label { display: none; } }
</style>
</head>
<body>
<div class="shell">
  <header>
    <span class="led" id="statusLed"></span>
    <div><h1>Saha Destek Asistanı</h1><div class="tag">FOUNDRY LOCAL // ÇEVRİMDIŞI ÇALIŞMA MODU</div></div>
    <span class="status-label" id="statusLabel">HAZIR</span>
  </header>

  <div class="upload-tray">
    <span class="eyebrow">Doküman Ekle (.md / .pdf)</span>
    <input type="file" id="fileInput" accept=".md,.pdf" />
    <button id="uploadBtn" type="button">Yükle ve İndeksle</button>
    <div id="uploadStatus"></div>
  </div>

  <div id="chat">
    <div class="empty-state" id="emptyState">
      <div class="big">Bir soru sorarak başla</div>
      <div class="suggestions">
        <span class="suggestion-chip">Vana bakımı ne sıklıkla yapılmalı?</span>
        <span class="suggestion-chip">Acil durumda hangi adımları izlemeliyim?</span>
        <span class="suggestion-chip">Basınç 80 bar üzerine çıkarsa ne yapmalıyım?</span>
      </div>
    </div>
  </div>

  <form id="form">
    <input id="input" placeholder="Bir soru sor…" autocomplete="off" />
    <button type="submit">Gönder</button>
  </form>
</div>

<script>
  const chat = document.getElementById("chat");
  const form = document.getElementById("form");
  const input = document.getElementById("input");
  const fileInput = document.getElementById("fileInput");
  const uploadBtn = document.getElementById("uploadBtn");
  const uploadStatus = document.getElementById("uploadStatus");
  const led = document.getElementById("statusLed");
  const statusLabel = document.getElementById("statusLabel");
  const emptyState = document.getElementById("emptyState");

  document.querySelectorAll(".suggestion-chip").forEach((chip) => {
    chip.addEventListener("click", () => { input.value = chip.textContent; form.requestSubmit(); });
  });

  function setStatus(state) {
    led.className = "led" + (state ? " " + state : "");
    const labels = { busy: "İŞLENİYOR", ok: "YANITLANDI", warn: "BULUNAMADI" };
    statusLabel.textContent = labels[state] || "HAZIR";
  }

  uploadBtn.addEventListener("click", async () => {
    const file = fileInput.files[0];
    if (!file) { uploadStatus.textContent = "Önce bir dosya seç."; return; }
    uploadBtn.disabled = true;
    uploadStatus.textContent = "⏳ Yükleniyor ve yeniden indeksleniyor…";
    const formData = new FormData();
    formData.append("document", file);
    try {
      const res = await fetch("/api/upload", { method: "POST", body: formData });
      const data = await res.json();
      if (data.error) uploadStatus.textContent = "✕ " + data.error;
      else { uploadStatus.textContent = `✓ "${data.filename}" eklendi — ${data.documentCount} doküman, ${data.chunkCount} chunk.`; fileInput.value = ""; }
    } catch { uploadStatus.textContent = "✕ Yükleme başarısız, bağlantıyı kontrol et."; }
    uploadBtn.disabled = false;
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const question = input.value.trim();
    if (!question) return;
    if (emptyState) emptyState.remove();

    addEntry("user", question);
    input.value = "";
    input.disabled = true;
    setStatus("busy");

    const { id, bodyEl } = addEntry("bot", "", true);
    let fullText = "";
    let firstTokenReceived = false;

    try {
      const res = await fetch("/api/chat/stream", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question }),
      });
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n\n");
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const data = JSON.parse(line.slice(6));

          if (data.token) {
            if (!firstTokenReceived) { firstTokenReceived = true; bodyEl.innerHTML = ""; }
            fullText += data.token;
            bodyEl.innerHTML = fullText.replace(/\n/g, "<br>") + '<span class="cursor"></span>';
            chat.scrollTop = chat.scrollHeight;
          } else if (data.done) {
            bodyEl.innerHTML = fullText.replace(/\n/g, "<br>");
            const entryEl = document.getElementById(id);
            const grounded = data.sources && data.sources.length > 0;
            entryEl.classList.add(grounded ? "grounded" : "no-info");
            setStatus(grounded ? "ok" : "warn");
            if (grounded) {
              const src = document.createElement("div");
              src.className = "sources";
              data.sources.forEach((s) => { const chip = document.createElement("span"); chip.className = "source-chip"; chip.textContent = s.title; src.appendChild(chip); });
              entryEl.querySelector(".entry-body").appendChild(src);
            }
          } else if (data.error) {
            bodyEl.textContent = "✕ " + data.error;
            setStatus("warn");
          }
        }
      }
    } catch {
      bodyEl.textContent = "✕ Bağlantı hatası.";
      setStatus("warn");
    }

    input.disabled = false;
    input.focus();
  });

  function addEntry(role, text, showDots) {
    const id = "e-" + Date.now() + Math.floor(Math.random() * 1000);
    const div = document.createElement("div");
    div.className = "entry " + role;
    div.id = id;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "user" ? "SEN" : "AI";
    div.appendChild(avatar);

    const entryBody = document.createElement("div");
    entryBody.className = "entry-body";

    const roleLabel = document.createElement("span");
    roleLabel.className = "role";
    roleLabel.textContent = role === "user" ? "Sen" : "Asistan";
    entryBody.appendChild(roleLabel);

    const bodyEl = document.createElement("div");
    bodyEl.className = "body-text";
    if (showDots) bodyEl.innerHTML = '<span class="dots"><span></span><span></span><span></span></span>';
    else bodyEl.textContent = text;
    entryBody.appendChild(bodyEl);

    div.appendChild(entryBody);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return { id, bodyEl };
  }
</script>
</body>
</html>
