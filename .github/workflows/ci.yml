name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Bağımlılıkları kur (native modüller hariç)
        run: npm install --ignore-scripts
        # --ignore-scripts: CI ortamında Foundry Local kurulu olmadığı ve
        # better-sqlite3/onnxruntime gibi native derlemeler CI'da gerekmediği için
        # (bu iş akışı sadece saf mantık testlerini çalıştırır) script'leri atlıyoruz.
        # Bu, CI'ı hızlandırır ve Foundry Local'e bağımlı olmayan testler için yeterlidir.

      - name: Unit testleri çalıştır
        run: node --test test/*.test.js